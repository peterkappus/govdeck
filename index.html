<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GovDeck</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
body{margin:0;font-family:Helvetica,Arial,sans-serif;background:#fff;color:#0b0c0c}
.slide{display:none;position:absolute;inset:0}.slide.active{display:block}
</style>
</head>
<body>
<div id="host"></div>
<script>
async function loadText(path){return fetch(path).then(r=>r.text())}
async function loadLayout(name){
 const src=await loadText(`layouts/${name}.slide`);
 const template=(src.match(/<template>([\s\S]*?)<\/template>/)||[])[1]||'';
 const style=(src.match(/<style>([\s\S]*?)<\/style>/)||[])[1]||'';
 return {template,style};
}
function parseSlides(md){
 return md.split(/^===slide===$/gm).map(s=>s.trim()).filter(Boolean).map(block=>{
 const lines=block.split('\n'); const meta={}; const body=[];
 let inMeta=true;
 for(const line of lines){
  const m=line.match(/^([a-zA-Z0-9_-]+):\s*(.*)$/);
  if(inMeta && m){meta[m[1]]=m[2];}
  else {inMeta=false; body.push(line)}
 }
 meta.content=marked.parse(body.join('\n').trim());
 return meta;
 });
}
(async()=>{
 const md=await loadText('content/slides.md');
 const slides=parseSlides(md); const host=document.getElementById('host');
 for(const slide of slides){
  const layout=await loadLayout(slide.layout||'agenda-item');
  let html=layout.template;
  Object.entries(slide).forEach(([k,v])=> html=html.replaceAll('{{'+k+'}}',v));
  const section=document.createElement('section');
  section.className='slide';
  section.innerHTML=html;
  host.appendChild(section);
  if(!document.getElementById('style-'+(slide.layout||'agenda-item'))){const st=document.createElement('style');st.id='style-'+(slide.layout||'agenda-item');st.textContent=layout.style;document.head.appendChild(st);} }
 const els=[...document.querySelectorAll('.slide')]; let cur=0;
 function show(i){cur=Math.max(0,Math.min(i,els.length-1));els.forEach((e,n)=>e.classList.toggle('active',n===cur));}
 document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')show(cur+1);if(e.key==='ArrowLeft')show(cur-1)});
 show(0);
})();
</script>
</body></html>
